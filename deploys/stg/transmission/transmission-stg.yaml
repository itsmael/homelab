# 1. ACESSO WEB (SERVICE)
apiVersion: v1
kind: Service
metadata:
  name: transmission-service
  namespace: k3s-stg
spec:
  type: NodePort
  selector:
    app: transmission
  ports:
    - protocol: TCP
      port: 9091        # Porta interna
      targetPort: 9091
      nodePort: 30091   # Acesse via http://192.168.18.50:30091
---
# 2. APLICAÇÃO (DEPLOYMENT)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission
  namespace: k3s-stg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transmission
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: transmission
    spec:
      containers:
      - name: transmission
        image: lscr.io/linuxserver/transmission:latest
        env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: "America/Sao_Paulo"
        ports:
          - containerPort: 9091
          - containerPort: 51413
        volumeMounts:
          - mountPath: /config
            name: transmission-config
          - mountPath: /downloads
            name: jellyfin-movies
          - mountPath: /watch
            name: transmission-watch
      volumes:
      # Configurações do App
      - name: transmission-config
        hostPath:
          path: /mnt/appa/transmission/config
          type: DirectoryOrCreate
      # INTEGRAÇÃO COM JELLYFIN: Aponta para a pasta de filmes que você já usa
      - name: jellyfin-movies
        hostPath:
          path: /mnt/appa/media/movies
          type: Directory
      # Pasta para monitorar novos .torrent
      - name: transmission-watch
        hostPath:
          path: /mnt/appa/transmission/watch
          type: DirectoryOrCreate
